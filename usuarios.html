{% extends "base.html" %}
{% block content %}

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
  <h2 style="font-size:20px">👤 Gestión de Usuarios</h2>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

<div class="card">
  <div class="card-header" style="background:#f9f9f9">Usuarios registrados</div>
  <div class="card-body" style="padding:0">
    <table>
      <thead><tr><th>Emoji</th><th>Nombre</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>
        {% for u in usuarios %}
        <tr>
          <td style="font-size:22px;text-align:center">{{ u.emoji }}</td>
          <td><strong>{{ u.nombre }}</strong></td>
          <td>
            {% if u.activo %}<span class="badge badge-verde">Activo</span>
            {% else %}<span class="badge badge-rojo">Inactivo</span>{% endif %}
          </td>
          <td>
            <div style="display:flex;gap:4px">
              <form method="POST" action="/usuarios/{{ u.id }}/toggle">
                <button class="btn btn-sm" style="background:#e67e22;color:#fff">
                  {% if u.activo %}⏸{% else %}▶{% endif %}
                </button>
              </form>
              <form method="POST" action="/usuarios/{{ u.id }}/eliminar"
                    onsubmit="return confirm('¿Eliminar a {{ u.nombre }}?')">
                <button class="btn btn-rojo btn-sm">🗑</button>
              </form>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<div class="card">
  <div class="card-header" style="color:#2d6a4f">➕ Agregar nuevo usuario</div>
  <div class="card-body">
    <form method="POST" action="/usuarios/agregar">
      <div class="form-group">
        <label>Nombre *</label>
        <input name="nombre" placeholder="Ej: Carlos" required>
      </div>
      <div class="form-group">
        <label>Emoji</label>
        <input name="emoji" placeholder="😊" value="😊" maxlength="4">
      </div>
      <button type="submit" class="btn btn-verde" style="width:100%;justify-content:center;padding:11px">
        ✅ Agregar Usuario
      </button>
    </form>
  </div>
</div>

</div>
{% endblock %}
